version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/data/chess3d.db
      - CORS_ORIGIN=*
      - JWT_SECRET=${JWT_SECRET:-chess3d-jwt-dev-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-chess3d-refresh-dev-secret}
    volumes:
      - chess3d_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: PostgreSQL for production scale
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: chess3d
  #     POSTGRES_USER: chess3d
  #     POSTGRES_PASSWORD: chess3d_dev
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data

volumes:
  chess3d_data:
  # pgdata:
