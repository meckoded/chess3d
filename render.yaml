services:
  - type: web
    name: chess3d
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        value: chess3d-prod-secret-2026
      - key: JWT_REFRESH_SECRET
        value: chess3d-refresh-prod-2026
      - key: DB_PATH
        value: /var/data/chess3d.db
