services:
  - type: web
    name: chess3d-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chess3d-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://chess3d.netlify.app

databases:
  - name: chess3d-db
    plan: free
