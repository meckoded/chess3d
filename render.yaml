services:
  - type: web
    name: chess3d
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://chess3d-i8rp.onrender.com"
      - key: JWT_SECRET
        value: chess3d-prod-secret-2026
      - key: JWT_REFRESH_SECRET
        value: chess3d-refresh-prod-2026
      - key: DB_PATH
        value: /opt/render/project/chess3d.db
